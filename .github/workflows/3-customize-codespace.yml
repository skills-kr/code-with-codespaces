name: Step 3 # Codespace 커스터마이징

on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/**"

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-use-codespace.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 단계 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_URL: ${{ needs.find_exercise.outputs.issue-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 업데이트 - 작업 확인 중
        run: |
          gh issue comment "$ISSUE_URL" \
            --body-file exercise-toolkit/markdown-templates/step-feedback/checking-work.md \
            --edit-last
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # START: Check practical exercise

      - name: features 설정 확인
        id: check-features-set
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .devcontainer/devcontainer.json
          keyphrase: "features"
          case-sensitive: false
          minimum-occurrences: 1

      - name: customizations 설정 확인
        id: check-customizations-set
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .devcontainer/devcontainer.json
          keyphrase: "customizations"
          case-sensitive: false
          minimum-occurrences: 1

      - name: command 설정 확인
        id: check-command-set
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .devcontainer/devcontainer.json
          keyphrase: "postCreateCommand"
          case-sensitive: false
          minimum-occurrences: 1

      - name: postCreate 스크립트 확인
        id: check-postcreate-script
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .devcontainer/postCreate.sh
          keyphrase: "install sl"
          case-sensitive: false
          minimum-occurrences: 1

      - name: 메시지 빌드 - 단계 결과
        id: build-message-step-results
        uses: skills/action-text-variables@v4
        with:
          template-file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          template-vars: |
            step_number: 3
            passed: ${{ !contains(steps.*.outcome, 'failure') }}
            results_table:
              - description: "devcontainer.json에 Features 추가"
                passed: ${{ steps.check-features-set.outcome == 'success' }}
              - description: "devcontainer.json에 Customizations 추가"
                passed: ${{ steps.check-customizations-set.outcome == 'success' }}
              - description: "devcontainer.json에 postCreate 명령 추가"
                passed: ${{ steps.check-command-set.outcome == 'success' }}
              - description: "postCreate 스크립트 생성"
                passed: ${{ steps.check-postcreate-script.outcome == 'success' }}

      - name: 댓글 생성 - 단계 결과
        run: |
          gh issue comment "$ISSUE_URL" \
            --body "$COMMENT_BODY" \
            --edit-last
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ steps.build-message-step-results.outputs.updated-text }}

      - name: 모든 검사를 통과하지 못하면 실패
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

      # END: Check practical exercise

      - name: 메시지 빌드 - 단계 완료
        id: build-message-step-finish
        uses: skills/action-text-variables@v4
        with:
          template-file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          template-vars: |
            next_step_number: 4

      - name: 댓글 업데이트 - 단계 완료
        run: |
          gh issue comment "$ISSUE_URL" \
            --body "$ISSUE_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ steps.build-message-step-finish.outputs.updated-text }}

  post_next_step_content:
    name: 다음 단계 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_URL: ${{ needs.find_exercise.outputs.issue-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 내용 추가
        run: |
          gh issue comment "$ISSUE_URL" \
            --body-file "$STEP_4_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 댓글 생성 - 진행 상황 확인 중
        run: |
          gh issue comment "$ISSUE_URL" \
            --body-file exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 현재 워크플로우 비활성화 및 다음 워크플로우 활성화
        run: |
          gh workflow disable "Step 3"
          gh workflow enable "Step 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "step",
              "step": 3,
              "description": "Codespace 커스터마이징",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true
